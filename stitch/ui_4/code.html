<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#256af4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style class="custom-icon-fill">
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style class="custom-icon-fill">
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center">
<div class="w-full max-w-md min-h-screen flex flex-col bg-white dark:bg-slate-900 shadow-sm">
<!-- Top Navigation -->
<header class="sticky top-0 z-10 flex items-center justify-between h-14 px-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-800">
<div class="w-10"></div>
<h1 class="text-lg font-semibold text-slate-900 dark:text-slate-100">마이 프로필</h1>
<button class="w-10 h-10 flex items-center justify-center text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</header><div class="px-6 pt-6 pb-2 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
    더욱 정확한 맞춤형 분석을 위해<br/>회원님의 정보를 최신으로 유지해주세요.
  </p>
</div>
<!-- Main Content Card -->
<main class="flex-1 px-6 pb-8">
<div class="bg-white dark:bg-slate-800 rounded-xl p-6 shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-700">
<div class="mb-8">
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold mb-2">내 정보 관리</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">정밀한 만세력 보정을 위해 정확한 정보를 입력해주세요.</p>
</div>
<div class="space-y-5">
<!-- Name Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">이름 (또는 닉네임)</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="예: 홍길동" type="text"/>
</div>
</div>
<!-- Birth Date Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">생년월일</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="연도-월-일" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">calendar_today</span>
</div>
</div>
<!-- Birth Time Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">태어난 시간</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-slate-100 font-normal focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="시간 선택" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">schedule</span>
</div>
</div>
<!-- Birth Location Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">태어난 지역 검색 (한국 도시)</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="도시명 검색 (예: 서울, 부산, 수원...)" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">location_on</span>
</div>
</div>
</div>
