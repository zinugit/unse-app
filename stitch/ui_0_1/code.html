<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#256af4",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-200 dark:bg-background-dark">
<div class="relative flex h-screen w-full flex-col overflow-hidden font-display">
<div class="flex-1 bg-slate-100 dark:bg-background-dark/50 flex flex-col justify-end">
<div class="relative flex h-[90%] w-full flex-col bg-white dark:bg-background-dark rounded-t-[32px] shadow-2xl overflow-hidden">
<div class="flex items-center justify-between p-4 pt-6">
<button class="text-slate-900 dark:text-slate-100 p-2">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold">정보 입력</h2>
<div class="w-10"></div>
</div>
<div class="flex flex-col items-center px-4 pb-2">
<div class="h-1.5 w-12 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
<div class="flex-1 overflow-y-auto px-6 pt-4 pb-32">
<h3 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-snug mb-8">
                        더욱 정확한 맞춤형 분석을 위해<br/>회원님의 정보를 입력해주세요.
                    </h3>
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">이름</label>
<input class="w-full h-14 px-4 rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary transition-all" placeholder="성함을 입력해주세요" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">생년월일</label>
<div class="relative">
<input class="w-full h-14 px-4 pr-12 rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary transition-all" placeholder="YYYY / MM / DD" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">calendar_today</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">태어난 시간</label>
<div class="relative">
<input class="w-full h-14 px-4 pr-12 rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary transition-all" placeholder="HH : MM" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">schedule</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">태어난 장소</label>
<div class="relative">
<input class="w-full h-14 px-4 pr-12 rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary transition-all" placeholder="도시 또는 지역 검색" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
</div>
</div>
</div>
</div>
<div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-white via-white/95 to-transparent dark:from-background-dark dark:via-background-dark/95">
<button class="w-full h-16 bg-primary hover:bg-primary/90 text-white text-lg font-bold rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
<span>분석 시작하기</span>
<span class="text-xl">✨</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
