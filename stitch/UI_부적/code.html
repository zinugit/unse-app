<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#256af4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1;
        }
        /* Galaxy S24+ optimization */
        :root {
            --safe-area-inset-top: env(safe-area-inset-top, 0px);
            --header-height: 56px;
        }
        .main-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .header-container {
            height: calc(var(--header-height) + var(--safe-area-inset-top));
            padding-top: var(--safe-area-inset-top);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .nav-item { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden">
<div class="relative mx-auto flex h-full max-w-[400px] flex-col bg-white dark:bg-slate-950 shadow-2xl main-container">
<!-- Unified Header -->
<header class="sticky top-0 z-50 bg-white dark:bg-background-dark border-b border-slate-100 dark:border-slate-800 header-container px-4 flex items-center justify-between transition-all duration-200">
<button class="p-2 -ml-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300 text-[24px]">menu</span>
</button>
<h1 class="text-[18px] font-bold tracking-tight absolute left-1/2 -translate-x-1/2 whitespace-nowrap">부적</h1>
<button class="p-2 -mr-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300 text-[24px]">settings</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col justify-between px-5 pt-6 pb-28 overflow-y-auto no-scrollbar">
<!-- Amulet Preview Section -->
<div class="flex flex-col items-center">
<div class="relative w-48 aspect-square rounded-full overflow-hidden border-4 border-slate-900 dark:border-slate-800 shadow-2xl bg-black">
<img alt="Golden Amulet" class="w-full h-full object-cover scale-110" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3HLUFQYEEsMfiLETiqbJufapr1A2FUgUJpXwydbhZGDysQCShG_LUlK2djS1h7s2JI4vvyK7V_t6NuC8dMI4xmh1IEerqTwOhcUfH0opCGxCL8HUJrPzB_aWEhBTya8tjuVPWGDaxV-nuDyrYD_Xx18CQbY_Exut2mO24dRYgkRf8h0m5ZAEFq3rZrpU3kH8zBYCK-Job0kcT8cLVyMS2r8l6EZcNQ9C3JC2FReyJDr6su9RB5NJYq9l-Vu9fb7rX4HNwijcIyWg"/>
</div>
<div class="mt-4">
<span class="bg-primary text-white text-[11px] font-bold px-4 py-1 rounded-full uppercase tracking-wider">PREVIEW</span>
</div>
<h2 class="mt-6 text-2xl font-bold text-center leading-tight">
                    현재 가장 간절히 바라는<br/>소망은 무엇인가요?
                </h2>
</div>
<!-- Keyword Selection Section -->
<section class="mt-8">
<div class="flex items-center justify-between mb-4">
<h3 class="text-slate-600 dark:text-slate-400 text-sm font-semibold">소망 키워드 선택</h3>
<span class="text-primary text-xs font-medium">1개 선택 가능</span>
</div>
<div class="grid grid-cols-2 gap-3">
<button class="h-14 flex items-center justify-center rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-50 transition-colors">
                        #재물
                    </button>
<button class="h-14 flex items-center justify-center rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-50 transition-colors">
                        #사업
                    </button>
<button class="h-14 flex items-center justify-center rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-50 transition-colors">
                        #취업/직장
                    </button>
<button class="h-14 flex items-center justify-center rounded-full border-2 border-primary bg-primary/5 text-primary font-bold transition-all shadow-sm">
                        #새로운연애
                    </button>
<button class="h-14 flex items-center justify-center rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-50 transition-colors">
                        #재회
                    </button>
<button class="h-14 flex items-center justify-center rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-50 transition-colors">
                        #가정/결혼
                    </button>
<button class="h-14 flex items-center justify-center rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-50 transition-colors">
                        #건강
                    </button>
<button class="h-14 flex items-center justify-center rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-50 transition-colors">
                        #학업/시험
                    </button>
</div>
</section>
<!-- Bottom Action Area -->
<div class="mt-8 flex flex-col gap-4">
<div class="relative">
<div class="absolute -top-3 left-4 z-10 bg-[#f9c513] px-2 py-0.5 rounded-md flex items-center gap-1 shadow-sm border border-black/5">
<span class="material-symbols-outlined text-[12px] text-primary" style="font-variation-settings: 'FILL' 1;">diamond</span>
<span class="text-[10px] font-black text-slate-800 uppercase tracking-tighter">PREMIUM</span>
</div>
<button class="w-full h-16 bg-primary text-white rounded-2xl font-bold text-lg shadow-lg shadow-primary/25 flex items-center justify-center gap-2 active:scale-95 transition-transform">
                        나만의 맞춤 부적 생성하기
                        <span class="material-symbols-outlined text-[24px]">arrow_forward</span>
</button>
</div>
<p class="text-center text-slate-400 text-[12px] leading-relaxed mb-4">
                    부적 생성 시 프리미엄 재화가 소모됩니다.<br/>
                    정성을 담아 제작된 부적은 내 정보에서 확인 가능합니다.
                </p>
</div>
</main>
<!-- Unified Bottom Tab Bar (Matching IMAGE_88) -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[400px] bg-white/95 dark:bg-slate-950/95 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 px-2 pb-8 pt-3 flex justify-around items-center z-50">
<a class="nav-item flex flex-col items-center gap-1.5 px-3 text-[#8e99af] dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[28px]">calendar_today</span>
<span class="text-[11px] font-medium">내 사주</span>
</a>
<a class="nav-item flex flex-col items-center gap-1.5 px-3 text-[#8e99af] dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[28px]">auto_awesome</span>
<span class="text-[11px] font-medium">오늘 운세</span>
</a>
<a class="nav-item flex flex-col items-center gap-1.5 px-3 text-[#8e99af] dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[28px]">groups</span>
<span class="text-[11px] font-medium">인연</span>
</a>
<a class="nav-item flex flex-col items-center gap-1.5 px-3 text-[#8e99af] dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[28px]">psychology</span>
<span class="text-[11px] font-medium">기질 분석</span>
</a>
<a class="nav-item flex flex-col items-center gap-1.5 px-3 text-primary" href="#">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">auto_fix_high</span>
<span class="text-[11px] font-bold">부적</span>
</a>
</nav>
</div>
</body></html>
